AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Oraculo do Bicho — Express API on Lambda + API Gateway HTTP API (v2)

# Non-secret config — overridable at deploy time.
Parameters:
  LlmProvider:
    Type: String
    Default: gemini
    AllowedValues: [gemini, openai]
  LlmTimeout:
    Type: String
    Default: '10000'
  PricePerRequest:
    Type: String
    Default: '0.10'
  PricePalpite:
    Type: String
    Default: '0.25'
  # Facilitator shared secret — generate with: openssl rand -hex 32
  # Set via parameter_overrides or inject post-deploy via aws ssm.
  FacilitatorToken:
    Type: String
    Default: ''
    NoEcho: true

  # Public RPC endpoints for the facilitator Lambda.
  # Override at deploy time to use a private / rate-limit-free provider.
  FacilitatorRpc137:
    Type: String
    Default: 'https://polygon-rpc.com'
  FacilitatorRpc8453:
    Type: String
    Default: 'https://mainnet.base.org'
  FacilitatorRpc80002:
    Type: String
    Default: 'https://rpc-amoy.polygon.technology'

Globals:
  Function:
    Timeout: 20
    MemorySize: 256
    Runtime: nodejs24.x
    Architectures:
      # - arm64
      - x86_64

Resources:
  # ── Facilitator: Lambda + Function URL ────────────────────────────────────
  FacilitatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: facilitator/
      Handler: index.handler
      Description: x402 facilitator — off-chain verify + on-chain settle EIP-3009
      Timeout: 60  # settle awaits tx receipt; give plenty of headroom
      FunctionUrlConfig:
        AuthType: NONE  # app-layer Bearer token handles authZ
      Environment:
        Variables:
          INTERNAL_TOKEN: !Ref FacilitatorToken
          RPC_137:   !Ref FacilitatorRpc137
          RPC_8453:  !Ref FacilitatorRpc8453
          RPC_80002: !Ref FacilitatorRpc80002
          # PRIVATE_KEY: ''  ← set via aws lambda update-function-configuration
          #                     or aws ssm put-parameter after first deploy

  # ── Backend: Lambda + API Gateway HTTP API ─────────────────────────────────
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - Content-Type
          - Authorization
          - Payment-Signature
          - X-Payment
        AllowMethods:
          - '*'
        ExposeHeaders:
          - Payment-Required
          - Payment-Response

  OraculoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: server/
      Handler: index.handler
      Description: Oraculo do Bicho Express server
      Environment:
        Variables:
          LLM_TIMEOUT: !Ref LlmTimeout
          LLM_PROVIDER: !Ref LlmProvider
          FACILITATOR_URL: !GetAtt FacilitatorFunctionUrl.FunctionUrl
          FACILITATOR_TOKEN: !Ref FacilitatorToken
          PRICE_PER_REQUEST: !Ref PricePerRequest
          PRICE_PALPITE: !Ref PricePalpite
          # Networks are hardcoded in payment.js — no X402_NETWORK env var needed

          EVM_ADDRESS: '0xd67f86f5fEd2dFfEA7CAc66f52b8D56EEE235a7c'          
          GEMINI_API_KEY: ''
          OPENAI_API_KEY: ''
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

  # ── Frontend: S3 + CloudFront ──────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'oraculo-do-bicho-frontend-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}'

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${AWS::StackName} frontend'
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100  # US, Canada, Europe — cheapest tier
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''  # must be empty when using OAC
            OriginAccessControlId: !GetAtt FrontendOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          # AWS Managed-CachingOptimized policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          # AWS Managed-SecurityHeadersPolicy
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
        # SPA fallback: send any 403/404 from S3 to index.html so the React
        # router handles the path client-side.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

Outputs:
  ApiUrl:
    Description: API Gateway HTTP API endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/'
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt OraculoFunction.Arn
  FacilitatorUrl:
    Description: Facilitator Lambda Function URL (internal — protected by Bearer token)
    Value: !GetAtt FacilitatorFunctionUrl.FunctionUrl
  FrontendBucketName:
    Description: S3 bucket — deploy frontend assets here (sam deploy does not upload them)
    Value: !Ref FrontendBucket
  FrontendUrl:
    Description: CloudFront distribution URL
    Value: !Sub 'https://${FrontendDistribution.DomainName}'

AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Oraculo do Bicho — Express API on Lambda + API Gateway HTTP API (v2)

# Non-secret config — overridable at deploy time.
Parameters:
  LlmProvider:
    Type: String
    Default: gemini
    AllowedValues: [gemini, openai]
  LlmTimeout:
    Type: String
    Default: '10000'
  GeminiModel:
    Type: String
    Default: 'gemini-2.0-flash'
  FacilitatorUrl:
    Type: String
    Default: 'https://x402.org/facilitator'
  PricePerRequest:
    Type: String
    Default: '0.01'
  X402Network:
    Type: String
    Default: 'eip155:84532'
  SecretsArn:
    Type: String
    Default: ''
    Description: |
      ARN of the Secrets Manager secret containing LLM API keys.
      The secret must be a JSON object with GEMINI_API_KEY and/or OPENAI_API_KEY.
      Secret name must start with "oraculo-do-bicho" to match the IAM policy.
      Leave empty to pass API keys via plain environment variables.

Globals:
  Function:
    Timeout: 20
    MemorySize: 256
    Runtime: nodejs24.x
    Architectures:
      # - arm64
      - x86_64

Resources:
  # ── Backend: Lambda + API Gateway HTTP API ─────────────────────────────────
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowHeaders:
          - Content-Type
          - Authorization
          - Payment-Signature
          - X-Payment
        AllowMethods:
          - '*'
        ExposeHeaders:
          - Payment-Required
          - Payment-Response

  OraculoFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: server/
      Handler: index.handler
      Description: Oraculo do Bicho Express server
      Environment:
        Variables:
          # Non-sensitive config values
          LLM_TIMEOUT: !Ref LlmTimeout
          LLM_PROVIDER: !Ref LlmProvider
          GEMINI_MODEL: !Ref GeminiModel
          X402_NETWORK: !Ref X402Network
          FACILITATOR_URL: !Ref FacilitatorUrl
          PRICE_PER_REQUEST: !Ref PricePerRequest

          # CORS — set to your CloudFront domain in production
          # ALLOWED_ORIGINS: 'https://your-cloudfront-domain.cloudfront.net'

          # Secrets Manager ARN — preferred over plain-text API keys
          SECRETS_ARN: !Ref SecretsArn

          # EVM wallet address (non-secret, identifies where payments go)
          EVM_ADDRESS: ''

          # Fallback plain-text API keys — only used when SECRETS_ARN is empty
          GEMINI_API_KEY: ''
          OPENAI_API_KEY: ''
      Policies:
        - Statement:
            - Sid: ReadApiSecrets
              Effect: Allow
              Action: secretsmanager:GetSecretValue
              # Scope to secrets with the project prefix — adjust if you use a different naming scheme
              Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:oraculo-do-bicho*'
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /
            Method: ANY
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /{proxy+}
            Method: ANY

  # ── Frontend: S3 + CloudFront ──────────────────────────────────────────────
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'oraculo-do-bicho-frontend-${AWS::AccountId}-${AWS::Region}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${AWS::StackName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}'

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub '${AWS::StackName} frontend'
        DefaultRootObject: index.html
        HttpVersion: http2and3
        PriceClass: PriceClass_100  # US, Canada, Europe — cheapest tier
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''  # must be empty when using OAC
            OriginAccessControlId: !GetAtt FrontendOAC.Id
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          # AWS Managed-CachingOptimized policy
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          # AWS Managed-SecurityHeadersPolicy
          ResponseHeadersPolicyId: 67f7725c-6f97-4210-82d7-5512b31e9d03
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          Compress: true
        # SPA fallback: send any 403/404 from S3 to index.html so the React
        # router handles the path client-side.
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

Outputs:
  ApiUrl:
    Description: API Gateway HTTP API endpoint URL
    Value: !Sub 'https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/'
  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt OraculoFunction.Arn
  FrontendBucketName:
    Description: S3 bucket — deploy frontend assets here (sam deploy does not upload them)
    Value: !Ref FrontendBucket
  FrontendUrl:
    Description: CloudFront distribution URL
    Value: !Sub 'https://${FrontendDistribution.DomainName}'

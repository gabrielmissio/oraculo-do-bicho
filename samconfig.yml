version: 0.1

default:
  global:
    parameters:
      region: us-east-1
      stack_name: oraculo-do-bicho

  build:
    parameters:
      cached: true
      parallel: true

  deploy:
    parameters:
      s3_prefix: oraculo-do-bicho
      resolve_s3: true
      capabilities: CAPABILITY_IAM
      confirm_changeset: true
      # Override non-secret config without editing the template.
      parameter_overrides: LlmProvider="openai" LlmTimeout="10000" 
      image_repositories: []

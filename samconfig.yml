version: 0.1

default:
  global:
    parameters:
      stack_name: oraculo-do-bicho

  build:
    parameters:
      cached: true
      parallel: true

  deploy:
    parameters:
      capabilities: CAPABILITY_IAM
      confirm_changeset: true
      resolve_s3: true
      region: us-east-1
      # Override non-secret config without editing the template.
      parameter_overrides:
        - LlmProvider=openai
        - LlmTimeout=10000
        - PricePerRequest=0.25
        - X402Network=eip155:84532
        - FacilitatorUrl=https://x402.org/facilitator
